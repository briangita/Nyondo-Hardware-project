<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nyondo Hardware - Stock Registration form</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Custom CSS -->
<link rel="stylesheet" href="bootstrap.css">
<link rel="stylesheet" href="Style.css">

</head>

<body>

<div class="container-fluid">
<div class="row">

<!-- Sidebar -->
<aside class="col-md-3 col-lg-2 sidebar">

<div class="profile-card">
<div class="avatar">Brian</div>

<div class="profile-text">
<h3>Brian Gita</h3>
<p>Stock Manager</p>
</div>
</div>

<div class="brand">
<h1>Nyondo Hardware</h1>
<span>Stock & Inventory System</span>
</div>

<nav class="menu">

<a href="index.html" class="nav-link">Home</a>
<a href="dashboard.html" class="nav-link">Dashboard</a>
<a href="sales-registration.html" class="nav-link">Sales Management</a>
<a href="supplier-registration.html" class="nav-link">Supplier Management</a>
<a href="stock-registration.html" class="nav-link active">Stock Management</a>
<a href="transport-management.html" class="nav-link">Transport Management</a>

</nav>

</aside>


<!-- Main Content -->
<main class="col-md-9 col-lg-10 main-content">

<div class="form-card">

<div class="form-title">

<div class="top-strip"></div>

<h2>Stock Registration Form</h2>

<p>Register stock items received into the inventory system</p>

</div>


<form>

<h3 class="section-title">Stock Item Details</h3>

<div class="row">

<div class="col-md-6 field">
<label>Item Name</label>
<input type="text" class="form-control">
</div>

<div class="col-md-6 field">
<label>Stock ID</label>
<input type="text" class="form-control">
</div>

<div class="col-md-6 field">
<label>Product Category</label>

<select class="form-select">

<option>Select category</option>
<option>Cement</option>
<option>Iron Sheets</option>
<option>Nails</option>
<option>Paint</option>
<option>Timber</option>

</select>

</div>

<div class="col-md-6 field">
<label>Supplier Name</label>
<input type="text" class="form-control">
</div>

<div class="col-md-4 field">
<label>Quantity Received</label>
<input type="number" class="form-control">
</div>

<div class="col-md-4 field">
<label>Unit Cost (UGX)</label>
<input type="number" class="form-control">
</div>

<div class="col-md-4 field">
<label>Selling Price (UGX)</label>
<input type="number" class="form-control">
</div>

<div class="col-md-6 field">
<label>Date Received</label>
<input type="date" class="form-control">
</div>

<div class="col-md-6 field">
<label>Storage Location</label>
<input type="text" class="form-control">
</div>

</div>


<h3 class="section-title">Stock Control</h3>

<div class="row">

<div class="col-md-4 field">
<label>Reorder Level</label>
<input type="number" class="form-control">
</div>

<div class="col-md-4 field">

<label>Unit of Measure</label>

<select class="form-select">

<option>Pieces</option>
<option>Bags</option>
<option>Kilograms</option>
<option>Litres</option>

</select>

</div>

<div class="col-md-4 field">

<label>Stock Status</label>

<select class="form-select">

<option>Available</option>
<option>Low Stock</option>
<option>Reserved</option>
<option>Damaged</option>

</select>

</div>

<div class="col-md-12 field">

<label>Notes</label>

<textarea class="form-control"></textarea>

</div>

</div>


<div class="actions">

<button type="reset" class="btn cancel">
Cancel
</button>

<button type="submit" class="btn submit">
Register Stock
</button>

<button type="submit" class="btn print"> Print Goods Receipt
</button>

</div>

</form>

</div>

</main>

</div>
</div>

</body>
</html>
