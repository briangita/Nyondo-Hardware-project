<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nyondo Hardware - Supplier Registration Form</title>

<link rel="stylesheet" href="Style.css">

</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<aside class="sidebar">

<div class="profile-card">
<div class="avatar">Brian</div>

<div class="profile-text">
<h3>Brian Gita</h3>
<p>Stock Manager</p>
</div>
</div>

<div class="brand">
<h1>Nyondo Hardware</h1>
<span>Stock & Inventory System</span>
</div>

<nav class="menu">
<a href="index.html">Home</a>
<a href="dashboard.html">Dashboard</a>
<a href="sales-management.html">Sales Management</a>
<a href="supplier-management.html" class="active">Supplier Management</a>
<a href="stock-management.html">Stock Management</a>
<a href="transport-management.html">Transport Management</a>
</nav>

</aside>


<!-- MAIN CONTENT -->
<main class="main">

<section class="form-card">

<h2>Supplier Registration Form</h2>
<p>Register and manage hardware suppliers</p>

<form>

<!-- SUPPLIER INFORMATION -->
<h3 class="section-title">Supplier Details</h3>

<div class="flex-row">

<div class="field">
<label>Supplier Name</label>
<input type="text" placeholder="Enter supplier name">
</div>

<div class="field">
<label>Company Name</label>
<input type="text" placeholder="Enter company name">
</div>

</div>

<div class="flex-row">

<div class="field">
<label>Phone Number</label>
<input type="tel" placeholder="Enter phone number">
</div>

<div class="field">
<label>Email Address</label>
<input type="email" placeholder="Enter email address">
</div>

</div>

<div class="flex-row">

<div class="field">
<label>Physical Address</label>
<input type="text" placeholder="City / District">
</div>

<div class="field">
<label>Country</label>
<input type="text" value="Uganda">
</div>

</div>


<!-- PRODUCTS SUPPLIED -->
<h3 class="section-title">Hardware Products Supplied</h3>

<div class="item-row">

<div class="field">
<label>Product Name</label>
<input type="text" placeholder="e.g Cement, Nails, Iron sheets">
</div>

<div class="field">
<label>Product Category</label>
<select>
<option>Select category</option>
<option>Cement</option>
<option>Steel</option>
<option>Timber</option>
<option>Roofing Materials</option>
<option>Tools</option>
<option>nails</option>
<option>Paint</option>
</select>
</div>

<div class="field">
<label>Unit Cost (UGX)</label>
<input type="number" placeholder="Enter unit price">
</div>

</div>

<div class="item-row">

<div class="field">
<label> Product Manufacturer</label>
<input type="text" placeholder="Enter manufacturer name">
</div>

<div class="field">
<label> Delivery Time (Days)</label>
<input type="number">
</div>

<div class="field">
<label>Product Quality</label>
<select>
<option>Standard</option>
<option>Premium</option>
<option>Economy</option>
</select>
</div>

</div>

<div class="field">
<label>Additional Details</label>
<input type="text" placeholder="Enter any additional details about the supplied products">
</div>



<!-- PAYMENT DETAILS -->
<h3 class="section-title">Payment Details</h3>

<div class="flex-row">

<div class="field">
<label>Payment Method</label>
<select>
<option>Select payment method</option>
<option>Bank Transfer</option>
<option>Mobile Money</option>
<option>Cash</option>
<option>Cheque</option>
</select>
</div>

<div class="field">
<label>Payment Terms</label>
<select>
<option>Select payment terms</option>
<option>Cash on Delivery</option>
<option>7 Days</option>
<option>14 Days</option>
<option>30 Days</option>
</select>
</div>

</div>

<div class="flex-row">

<div class="field">
<label>Bank Name</label>
<input type="text" placeholder="Enter bank name">
</div>

<div class="field">
<label>Account Number</label>
<input type="text" placeholder="Enter account number">
</div>

<div class="field">
<label>Tax Identification Number</label>
<input type="number" placeholder="EnterTIN number">
</div>

</div>

<div class="flex-row">

<div class="field">
<label>Mobile Money Number</label>
<input type="tel" placeholder="MTN / Airtel Money">
</div>

<div class="field">
<label>Contact Person</label>
<input type="text" placeholder="Supplier representative">
</div>

</div>


<!-- ACTION BUTTONS -->
<div class="actions">

<button type="reset" class="btn cancel">
Cancel
</button>

<button type="submit" class="btn submit">
Register Supplier
</button>

<button type="submit" class="btn print"> Print Purchase Order
</button>

</div>

</form>

</section>

</main>

</div>

</body>
</html>
